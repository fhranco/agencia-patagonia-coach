<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
    <style>@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap');
    * { font-family: 'Space Grotesk', sans-serif; }</style>
    
            <defs>
                <filter id="tri-glow" x="-50%" y="-50%" width="200%" height="200%">
                    <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="spread" />
                    <feGaussianBlur in="spread" stdDeviation="6" result="blur" />
                    <feFlood flood-color="#00f5d4" flood-opacity="0.7" result="color" />
                    <feComposite in="color" in2="blur" operator="in" result="glow" />
                    <feMerge>
                        <feMergeNode in="glow" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
                <filter id="text-glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#00f5d4" flood-opacity="0.4" />
                </filter>
            </defs>
        
    <rect width="200" height="200" fill="#0a0a0f" />
    <circle cx="100" cy="100" r="60" stroke="#f0f0f0" stroke-width="2" fill="none" />
    
            <line x1="100" y1="40" x2="100" y2="26" stroke="#f0f0f0" stroke-width="1.5" stroke-linecap="butt" />
            <line x1="100" y1="160" x2="100" y2="174" stroke="#f0f0f0" stroke-width="1.5" stroke-linecap="butt" />
            <line x1="160" y1="100" x2="174" y2="100" stroke="#f0f0f0" stroke-width="1.5" stroke-linecap="butt" />
            <line x1="40" y1="100" x2="26" y2="100" stroke="#f0f0f0" stroke-width="1.5" stroke-linecap="butt" />
        
    <polygon points="100,72 84,100 116,100" fill="#00f5d4" filter="url(#tri-glow)" />
    
</svg>